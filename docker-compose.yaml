services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - "mssql_data:/var/opt/mssql"
    # 1. Add Healthcheck to wait for SQL Server to be fully ready
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD}' -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: StoreApi/Dockerfile
      target: final
    restart: always
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - ConnectionStrings__DefaultConnection=Server=db;Database=StoreDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      - JwtSettings__SecretKey=${JWT_SECRET}
    depends_on:
      # 2. Tell the API to wait until the database healthcheck passes
      db:
        condition: service_healthy

volumes:
  mssql_data:
